<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RayNeo">
<title>RayNeo Remote</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#000; color:#eee; padding:16px; }
  h1 { margin:0 0 8px; font-size:18px; color:#9cf; }
  .muted { color:#777; font-size:12px; margin-bottom:8px; }
  input, textarea { width:100%; padding:14px; font-size:16px; background:#1a1a1a; color:#eee; border:1px solid #333; border-radius:8px; margin-bottom:8px; }
  button { width:100%; padding:16px; font-size:16px; background:#27c; color:white; border:none; border-radius:8px; margin-bottom:8px; font-weight:600; }
  button.ghost { background:#222; color:#9cf; font-weight:500; }
  .row { display:flex; gap:8px; }
  .row button { flex:1; }
  .section { margin-top:16px; padding-top:16px; border-top:1px solid #222; }
  details { margin-top:16px; padding-top:12px; border-top:1px solid #222; }
  details summary { color:#888; font-size:12px; cursor:pointer; padding:6px 0; list-style:none; }
  details summary::-webkit-details-marker { display:none; }
  details[open] summary::before { content:'▾ '; }
  details:not([open]) summary::before { content:'▸ '; }
  #status { padding:8px 0 0; font-size:11px; color:#6c6; min-height:1.2em; word-break:break-all; }
</style>
</head>
<body>
  <h1>RayNeo Remote</h1>

  <input id="url" type="url" placeholder="URL or search" autocapitalize="off" autocorrect="off">
  <div class="row">
    <button onclick="nav()" style="flex:3;">Open</button>
    <button class="ghost" onclick="copyUrl()" style="flex:1;">Copy</button>
  </div>

  <div class="row">
    <button class="ghost" onclick="back()">← Back</button>
    <button class="ghost" onclick="refresh()">↻ Refresh</button>
    <button class="ghost" onclick="fwd()">Forward →</button>
  </div>

  <div class="section">
    <div class="muted">Video</div>
    <button onclick="play()">▶ Play / Pause</button>
    <div class="row">
      <button class="ghost" onclick="seek(-30)">− 30s</button>
      <button class="ghost" onclick="seek(-10)">− 10s</button>
      <button class="ghost" onclick="seek(10)">+ 10s</button>
      <button class="ghost" onclick="seek(30)">+ 30s</button>
    </div>
    <div class="row">
      <input id="seekto" type="text" placeholder="m:ss or seconds" style="margin:0;">
      <button class="ghost" onclick="seekTo()" style="flex:0 0 90px; margin:0;">Jump to</button>
    </div>
    <button class="ghost" onclick="fullscreen()">⛶ Maximize</button>
    <div class="row">
      <button class="ghost" onclick="vol('down')">🔉 Vol −</button>
      <button class="ghost" onclick="vol('up')">🔊 Vol +</button>
      <button class="ghost" onclick="vol('mute')">Mute</button>
    </div>
  </div>

  <div class="section">
    <div class="muted">Page</div>
    <div class="row">
      <button class="ghost" onclick="scroll('up')">↑ Scroll up</button>
      <button class="ghost" onclick="scroll('down')">↓ Scroll down</button>
    </div>
    <div class="row">
      <button class="ghost" onclick="zoom(-10)">A−</button>
      <button class="ghost" onclick="zoom(0, 100)">100%</button>
      <button class="ghost" onclick="zoom(10)">A+</button>
    </div>
  </div>

  <div class="section">
    <div class="muted">Text input</div>
    <input id="typebox" type="text" placeholder="Text to type into focused field">
    <button onclick="typeText()">Type</button>
    <div class="row">
      <button class="ghost" onclick="nativeKey('TAB')">Tab</button>
      <button class="ghost" onclick="nativeKey('SPACE')">Space</button>
      <button class="ghost" onclick="nativeKey('ENTER')">Enter</button>
    </div>
  </div>

  <div class="section">
    <div class="muted">Presets</div>
    <button class="ghost" onclick="go('https://google.com')">Google</button>
    <button class="ghost" onclick="go('https://youtube.com')">YouTube</button>
    <button class="ghost" onclick="go('https://www.corebalancetraining.com')">Core Balance Training</button>
  </div>

  <div class="section">
    <div class="muted">History
      <button class="ghost" onclick="loadHistory()" style="display:inline;width:auto;padding:4px 10px;margin-left:8px;font-size:11px;">↻ Refresh</button>
    </div>
    <div id="history"></div>
  </div>

  <details>
    <summary>Advanced</summary>
    <input id="selector" type="text" placeholder="CSS selector, e.g. button.play">
    <button class="ghost" onclick="tapCustom()">Tap element by selector</button>
  </details>

  <div id="status"></div>

<script>
const base = location.origin;
function setStatus(s) { document.getElementById('status').textContent = s; }

async function postJson(path, body) {
  try {
    const r = await fetch(base + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    setStatus(path + ' → ' + r.status);
    return r;
  } catch (e) { setStatus('error: ' + e); }
}

async function get(path) {
  try {
    const r = await fetch(base + path);
    const t = await r.text();
    setStatus(path + ' → ' + t.slice(0, 80));
    return t;
  } catch (e) { setStatus('error: ' + e); }
}

function nav() {
  let u = document.getElementById('url').value.trim();
  if (!u) return;
  if (!/^https?:/.test(u)) {
    u = (u.includes('.') && !u.includes(' ')) ? 'https://' + u : 'https://www.google.com/search?q=' + encodeURIComponent(u);
  }
  go(u);
}
function go(u) { document.getElementById('url').value = u; postJson('/url', { url: u }); }

function back()       { get('/back'); }
function fwd()        { get('/forward'); }
function refresh()    { get('/refresh'); }
function play()       { get('/play'); }
function fullscreen() { get('/fullscreen'); }
function vol(action)  { get('/volume?action=' + action); }
function nativeKey(n) { get('/key?name=' + n); }
function seek(delta)  { get('/seek?delta=' + delta); }
function scroll(dir)   { get('/scroll?dir=' + dir); }
function zoom(delta, abs) {
  if (abs !== undefined) get('/zoom?level=' + abs);
  else get('/zoom?delta=' + delta);
}
async function loadHistory() {
  try {
    const r = await fetch(base + '/history');
    const arr = await r.json();
    const box = document.getElementById('history');
    if (!arr.length) { box.innerHTML = '<div class="muted">(empty — visit some pages)</div>'; return; }
    box.innerHTML = arr.map(e => {
      const label = (e.title && e.title.trim()) || e.url;
      const urlJson = JSON.stringify(e.url).replace(/"/g, '&quot;');
      return '<div style="display:flex;gap:6px;margin-bottom:6px;align-items:stretch;">' +
        '<div style="flex:1;min-width:0;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 10px;overflow:hidden;">' +
          '<div style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(label) + '</div>' +
          '<div class="muted" style="font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;">' + escapeHtml(e.url) + '</div>' +
        '</div>' +
        '<button class="ghost" style="flex:0 0 auto;width:auto;padding:0 10px;margin:0;font-size:12px;" onclick="copyText(' + urlJson + ')">Copy</button>' +
        '<button class="ghost" style="flex:0 0 auto;width:auto;padding:0 10px;margin:0;font-size:12px;" onclick="go(' + urlJson + ')">Open</button>' +
      '</div>';
    }).join('');
  } catch (e) { setStatus('history failed: ' + e); }
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); setStatus('copied: ' + text.slice(0, 60)); }
  catch (e) { setStatus('copy failed: ' + e); }
}

async function copyUrl() {
  try {
    const r = await fetch(base + '/title');
    const j = await r.json();
    if (!j.url) return setStatus('no url');
    await navigator.clipboard.writeText(j.url);
    setStatus('copied: ' + j.url.slice(0, 60));
  } catch (e) { setStatus('copy failed: ' + e); }
}

function seekTo() {
  const raw = document.getElementById('seekto').value.trim();
  if (!raw) return;
  // parse m:ss, h:mm:ss, or raw seconds
  const parts = raw.split(':').map(Number);
  if (parts.some(isNaN)) return setStatus('invalid time');
  let secs = 0;
  if (parts.length === 1) secs = parts[0];
  else if (parts.length === 2) secs = parts[0]*60 + parts[1];
  else if (parts.length === 3) secs = parts[0]*3600 + parts[1]*60 + parts[2];
  get('/seek?to=' + secs);
}

function typeText() {
  const t = document.getElementById('typebox').value;
  if (!t) return;
  const js = '(function(){var el=document.activeElement;if(el&&"value" in el){el.value='+JSON.stringify(t)+';el.dispatchEvent(new Event("input",{bubbles:true}));return "typed";}return "no-focused-input";})()';
  fetch(base + '/js', { method: 'POST', body: js }).then(r => r.text()).then(t => setStatus('type: ' + t));
}

function tapCustom() {
  const s = document.getElementById('selector').value.trim();
  if (!s) return;
  postJson('/tap-element', { selector: s });
}

document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') nav(); });
loadHistory();
</script>
</body>
</html>
